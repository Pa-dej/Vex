[listener]
# listener.bind is applied only on process start.
# Changing port/address requires process restart.
# routing, protocol_map, auth, and health are hot-applied via POST /reload.
bind = "0.0.0.0:25577"
max_packet_size = 8388608

[auth]
mode = "offline"

[limits]
max_connections = 100000
initial_buffer_bytes = 1024
per_connection_cap_bytes = 65536
global_memory_budget_bytes = 2147483648
handshake_timeout_ms = 2000
login_timeout_ms = 4000
# Anti-bot rate limits — подними для бенчмарка
max_connections_total = 100000
per_ip_rate_limit = 20
per_subnet_rate_limit = 50

[anti_bot]
enabled = true
attack_cps_threshold = 100
attack_login_fail_ratio = 0.5
attack_unique_ip_threshold = 500

[reputation]
enabled = true
decay_interval_secs = 60
cleanup_timeout_secs = 600
block_duration_first_secs = 30
block_duration_second_secs = 120
block_duration_max_secs = 600

[health]
interval_ms = 2000
status_timeout_ms = 1000
tcp_timeout_ms = 500
unhealthy_fail_threshold = 3
recovery_success_threshold = 2

[routing]
allow_degraded = true

[[routing.backends]]
name = "lobby-1"
address = "127.0.0.1:25565"
weight = 1.0

[observability]
log_level = "debug"
log_format = "pretty"

[admin]
bind = "127.0.0.1:8080"
auth_token = "change-me"

[shutdown]
drain_seconds = 20
disconnect_message = "Proxy is restarting, reconnect in a few seconds."

[protocol_map]
path = "config/protocol_ids.toml"

[forwarding.velocity]
enabled = true
secret = "test-secret-123"

[plugins]
enabled = true
dir = "plugins"
event_handler_timeout_ms = 500
intercept_plugin_messages = false
watch = false
watch_debounce_ms = 500

[status]
motd = "§bA §fVex §bProxy"
max_players = 1000
show_real_online = true

[cluster]
enabled = false
node_id = "node-1"
node_announce_interval_ms = 5000

[cluster.redis]
url = "redis://127.0.0.1:6379"
prefix = "vex:"
connect_timeout_ms = 2000
operation_timeout_ms = 500
max_connections = 16
